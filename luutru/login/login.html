<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Đăng nhập tài khoản du lịch Cần Thơ để lưu địa điểm yêu thích.">

    <title>Đăng nhập - Du lịch Cần Thơ</title>

    <link rel="shortcut icon" href="../image/android-chrome-512x512.png" type="image/png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="login-page">
    <section class="hero hero--login" aria-labelledby="login-hero-title">
        <div class="hero__content">
            <h1 class="hero__title" id="login-hero-title">Đăng nhập</h1>
            <p class="hero__text">
                Đăng nhập để lưu lại những địa điểm yêu thích<br>
                và trải nghiệm du lịch Cần Thơ thuận tiện hơn.
            </p>
        </div>
    </section>

    <main class="login-main">
        <section class="login-card" aria-labelledby="login-form-title">
            <div class="login-card__avatar" aria-hidden="true">
                <i class="fa-solid fa-user-circle"></i>
            </div>

            <h2 class="login-card__title" id="login-form-title">Đăng nhập tài khoản</h2>
            <p class="login-card__subtitle">Chào mừng bạn quay trở lại!</p>

            <form class="login-form" id="login-form" novalidate>
                <div class="login-form__group">
                    <label class="login-form__label" for="email">Email</label>
                    <div class="login-form__field">
                        <i class="fa-solid fa-envelope login-form__icon" aria-hidden="true"></i>
                        <input class="login-form__input" type="email" id="email" name="email" placeholder="Nhập email của bạn" autocomplete="email" aria-describedby="email-error">
                    </div>
                    <p class="login-form__error" id="email-error" aria-live="polite"></p>
                </div>

                <div class="login-form__group">
                    <label class="login-form__label" for="password">Password</label>
                    <div class="login-form__field">
                        <i class="fa-solid fa-lock login-form__icon" aria-hidden="true"></i>
                        <input class="login-form__input login-form__input--password" type="password" id="password" name="password" placeholder="Nhập mật khẩu" autocomplete="current-password" aria-describedby="password-error">
                        <button class="login-form__toggle" type="button" aria-label="Hiện mật khẩu" data-password-toggle>
                            <i class="fa-solid fa-eye" aria-hidden="true"></i>
                        </button>
                    </div>
                    <p class="login-form__error" id="password-error" aria-live="polite"></p>
                </div>

                <div class="login-form__options">
                    <label class="login-form__remember" for="remember">
                        <input type="checkbox" id="remember" name="remember">
                        <span>Ghi nhớ đăng nhập</span>
                    </label>
                    <a class="login-form__link" href="#">Quên mật khẩu?</a>
                </div>

                <button class="login-form__submit" type="submit">
                    <span class="login-form__spinner" aria-hidden="true"></span>
                    <span class="login-form__submit-text">ĐĂNG NHẬP</span>
                </button>

                <p class="login-form__register">
                    Chưa có tài khoản?<br>
                    <a class="login-form__link" href="register.html">Đăng ký ngay</a>
                </p>
            </form>
        </section>
    </main>

    <div class="login-toast" role="status" aria-live="polite" aria-atomic="true" data-toast>
        Đăng nhập thành công!
    </div>

    <script src="login.js"></script>
</body>
</html>
